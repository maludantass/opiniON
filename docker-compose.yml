services:
  postgres:
    image: postgres:15-alpine
    container_name: opinion-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: opinion
    volumes:
      - opinion_pg_data:/var/lib/postgresql/data

volumes:
  opinion_pg_data:
